services:
  postgres:
    image: postgres:16-alpine
    container_name: peerahat-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: peerahat
    ports:
      - "5432:5432"
    volumes:
      - peerahat-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d peerahat"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Backs BullMQ jobs for payout batches (FR-PM-06) and escrow release
  # (FR-PM-05). Container name kept stable for app-side IORedis config.
  redis:
    image: redis:7-alpine
    container_name: peerahat-redis
    ports:
      - "6379:6379"
    volumes:
      - peerahat-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # S3-compatible storage for KYC + sheet uploads (NFR-03). Console at
  # http://localhost:9001 (login minioadmin/minioadmin). API on 9000.
  # Set the S3_* env vars in apps/api/.env to point at this:
  #   S3_ENDPOINT=http://localhost:9000
  #   S3_REGION=us-east-1
  #   S3_ACCESS_KEY_ID=minioadmin
  #   S3_SECRET_ACCESS_KEY=minioadmin
  #   S3_BUCKET_KYC=peerahat-kyc
  #   S3_BUCKET_SHEETS=peerahat-sheets
  #   S3_BUCKET_KYC_ARCHIVE=peerahat-kyc-archive
  minio:
    image: minio/minio:latest
    container_name: peerahat-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - peerahat-minio:/data

  # One-shot: creates the KYC + sheets buckets idempotently on first
  # boot. Retries until minio answers, then exits. Healthcheck behavior
  # changes across minio image revisions, so a retry loop in the init
  # container is more durable than a depends_on/condition pair.
  minio-init:
    image: minio/mc:latest
    container_name: peerahat-minio-init
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 minioadmin minioadmin >/dev/null 2>&1; do
          echo 'waiting for minio...'; sleep 1;
        done
        mc mb --ignore-existing local/peerahat-kyc
        mc mb --ignore-existing local/peerahat-sheets
        mc mb --ignore-existing local/peerahat-kyc-archive
        echo 'Buckets ready: peerahat-kyc, peerahat-sheets, peerahat-kyc-archive'

  # ─── Application services ──────────────────────────────────────────────
  # Optional. The infra-only flow (`docker compose up -d postgres redis
  # minio minio-init`) still works for local `pnpm dev`. To run the full
  # stack in containers, use `docker compose --profile app up -d`.

  # NestJS API. Runs `prisma migrate deploy` on boot so a fresh DB volume
  # gets the schema before main.js starts listening. Loads secrets from
  # apps/api/.env, then overrides the infra URLs so they resolve against
  # the compose network rather than localhost on the host.
  api:
    profiles: ["app"]
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: peerahat-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    env_file:
      - apps/api/.env
    environment:
      PORT: "3001"
      WEB_ORIGIN: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/peerahat?schema=public
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
    ports:
      - "3001:3001"
    command:
      - sh
      - -c
      - |
        apps/api/node_modules/.bin/prisma migrate deploy --schema apps/api/prisma/schema.prisma
        exec node apps/api/dist/src/main.js

  # Next.js web. NEXT_PUBLIC_* are baked at build time, so they're passed
  # via build args (interpolated from a repo-root .env or your shell env).
  # The browser still talks to the API on http://localhost:3001/api — the
  # `api` service publishes that port to the host.
  web:
    profiles: ["app"]
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001/api}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
        NEXT_PUBLIC_SUPABASE_GOOGLE_ENABLED: ${NEXT_PUBLIC_SUPABASE_GOOGLE_ENABLED:-true}
        NEXT_PUBLIC_BOOKING_DAY_START_HOUR: ${NEXT_PUBLIC_BOOKING_DAY_START_HOUR:-9}
        NEXT_PUBLIC_BOOKING_DAY_END_HOUR: ${NEXT_PUBLIC_BOOKING_DAY_END_HOUR:-21}
    container_name: peerahat-web
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  peerahat-pg:
  peerahat-redis:
  peerahat-minio:
