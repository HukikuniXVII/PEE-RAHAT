services:
  postgres:
    image: postgres:16-alpine
    container_name: peerahat-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: peerahat
    ports:
      - "5432:5432"
    volumes:
      - peerahat-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d peerahat"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Backs BullMQ jobs for payout batches (FR-PM-06) and escrow release
  # (FR-PM-05). Container name kept stable for app-side IORedis config.
  redis:
    image: redis:7-alpine
    container_name: peerahat-redis
    ports:
      - "6379:6379"
    volumes:
      - peerahat-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # S3-compatible storage for KYC + sheet uploads (NFR-03). Console at
  # http://localhost:9001 (login minioadmin/minioadmin). API on 9000.
  # Set the S3_* env vars in apps/api/.env to point at this:
  #   S3_ENDPOINT=http://localhost:9000
  #   S3_REGION=us-east-1
  #   S3_ACCESS_KEY_ID=minioadmin
  #   S3_SECRET_ACCESS_KEY=minioadmin
  #   S3_BUCKET_KYC=peerahat-kyc
  #   S3_BUCKET_SHEETS=peerahat-sheets
  minio:
    image: minio/minio:latest
    container_name: peerahat-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - peerahat-minio:/data

  # One-shot: creates the KYC + sheets buckets idempotently on first
  # boot. Retries until minio answers, then exits. Healthcheck behavior
  # changes across minio image revisions, so a retry loop in the init
  # container is more durable than a depends_on/condition pair.
  minio-init:
    image: minio/mc:latest
    container_name: peerahat-minio-init
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 minioadmin minioadmin >/dev/null 2>&1; do
          echo 'waiting for minio...'; sleep 1;
        done
        mc mb --ignore-existing local/peerahat-kyc
        mc mb --ignore-existing local/peerahat-sheets
        echo 'Buckets ready: peerahat-kyc, peerahat-sheets'

volumes:
  peerahat-pg:
  peerahat-redis:
  peerahat-minio:
