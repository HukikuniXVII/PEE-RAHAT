services:
  postgres:
    image: postgres:16-alpine
    container_name: peerahat-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: peerahat
    ports:
      - "5432:5432"
    volumes:
      - peerahat-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d peerahat"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Backs BullMQ jobs for payout batches (FR-PM-06) and escrow release
  # (FR-PM-05). Container name kept stable for app-side IORedis config.
  redis:
    image: redis:7-alpine
    container_name: peerahat-redis
    ports:
      - "6379:6379"
    volumes:
      - peerahat-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  peerahat-pg:
  peerahat-redis:
